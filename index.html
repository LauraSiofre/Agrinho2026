<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Quiz Super Humano</title>
    <style>
        /* --- ESTILO (CSS) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .quiz-container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .screen {
            transition: all 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h1, h2 {
            margin-bottom: 20px;
            color: #4a4e69;
        }

        p {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #6c757d;
        }

        .progress-bar-container {
            background-color: #f0f0f0;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-bar {
            background-color: #4a90e2;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #e8f0fe;
            border-color: #4a90e2;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .btn:hover {
            background-color: #357abd;
        }

        .feedback {
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="start-screen" class="screen">
            <h1>Olá! Que bom ter você aqui! 👋</h1>
            <p>Preparamos um teste super rápido de 3 perguntas para testar seus conhecimentos de forma leve e divertida!</p>
            <button id="start-btn" class="btn">Vamos começar?</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <h2 id="question-text">Aqui vai a pergunta...</h2>
            <div id="options-container" class="options-grid"></div>
            <div id="feedback" class="feedback hidden"></div>
            <button id="next-btn" class="btn hidden">Avançar ➡️</button>
        </div>

        <div id="result-screen" class="screen hidden">
            <h2>E o resultado saiu! 🎉</h2>
            <p id="result-text">Você mandou muito bem!</p>
            <button id="restart-btn" class="btn">Tentar de novo 🔄</button>
        </div>
    </div>

    <script>
        /* --- LÓGICA (JavaScript) --- */
        const questions = [
            {
                question: "Qual dessas linguagens dá 'vida' e interatividade para uma página web? 🤔",
                options: ["HTML", "CSS", "JavaScript", "SQL"],
                answer: 2,
                feedbackCorrect: "Arrasou! O JavaScript é a alma da interatividade na web. ✨",
                feedbackWrong: "Quase lá! O HTML estrutura e o CSS embeleza, mas quem manda nas ações é o JavaScript. 🚀"
            },
            {
                question: "Onde é o melhor lugar para salvar seus códigos e mostrar seus projetos para o mundo? 🌍",
                options: ["No bloco de notas", "No GitHub", "No Instagram", "No Pendrive do seu tio"],
                answer: 1,
                feedbackCorrect: "Isso aí! O GitHub é a rede perfeita para nós, devs! 💻",
                feedbackWrong: "Hum, não exatamente. Guardar no GitHub te ajuda a criar um portfólio incrível! 📈"
            },
            {
                question: "Se um código não funcionar de primeira, o que você deve fazer? ❤️",
                options: ["Chorar um pouco", "Desistir de tudo", "Respirar fundo, ler o erro e tentar de novo", "Jogar o computador pela janela"],
                answer: 2,
                feedbackCorrect: "Exatamente! Errar faz parte do aprendizado. Você tem mentalidade de dev! 🧠",
                feedbackWrong: "Calma! Erros acontecem com todo mundo. Respirar fundo e analisar o problema é o segredo. 🧘"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        const progressBar = document.getElementById('progress-bar');
        const resultText = document.getElementById('result-text');

        startBtn.addEventListener('click', startQuiz);
        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        });
        restartBtn.addEventListener('click', startQuiz);

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            resetState();
            const currentQuestion = questions[currentQuestionIndex];
            questionText.innerText = currentQuestion.question;
            
            const progressPercent = (currentQuestionIndex / questions.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.addEventListener('click', () => selectOption(index));
                optionsContainer.appendChild(button);
            });
        }

        function resetState() {
            nextBtn.classList.add('hidden');
            feedback.classList.add('hidden');
            optionsContainer.innerHTML = '';
        }

        function selectOption(selectedIndex) {
            const currentQuestion = questions[currentQuestionIndex];
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuestion.answer) {
                buttons[selectedIndex].classList.add('correct');
                feedback.innerText = currentQuestion.feedbackCorrect;
                feedback.style.color = "#28a745";
                score++;
            } else {
                buttons[selectedIndex].classList.add('wrong');
                buttons[currentQuestion.answer].classList.add('correct');
                feedback.innerText = currentQuestion.feedbackWrong;
                feedback.style.color = "#dc3545";
            }

            feedback.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = "Ver meu Resultado 🏁";
            } else {
                nextBtn.innerText = "Avançar ➡️";
            }
        }

        function showResult() {
            progressBar.style.width = '100%';
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            if (score === questions.length) {
                resultText.innerHTML = `🌟 <strong>Uau! Você gabaritou (${score}/${questions.length})!</strong><br>Você mandou bem demais, parabéns! 🎉`;
            } else if (score >= questions.length / 2) {
                resultText.innerHTML = `👍 <strong>Muito bom! Você acertou ${score} de ${questions.length}.</strong><br>Foi por muito pouco! O importante é o que você aprendeu hoje. 🚀`;
            } else {
                resultText.innerHTML = `🌱 <strong>Valeu a tentativa! Você acertou ${score} de ${questions.length}.</strong><br>O aprendizado é uma jornada. Que tal tentar mais uma vez? Você consegue! 💪`;
            }
        }
    </script>
</body>
</html>
